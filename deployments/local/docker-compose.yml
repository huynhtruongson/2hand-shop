name: 2hand-shop

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    container_name: keycloak
    command: start-dev
    environment:
      KC_LOG_LEVEL: DEBUG
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KK_TO_RMQ_URL: rabbitmq
      KK_TO_RMQ_PORT: 5672
      KK_TO_RMQ_VHOST: 2hand-shop
      KK_TO_RMQ_USERNAME: keycloak_sa
      KK_TO_RMQ_PASSWORD: keycloak_sa
      KK_TO_RMQ_EXCHANGE: keycloak.events
    ports:
      - "8100:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-to-rabbit-3.0.5.jar:/opt/keycloak/providers/keycloak-to-rabbit-3.0.5.jar
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq_definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      CLI_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: true
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-elastic}
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:${ELASTIC_PASSWORD:-elastic}", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Traefik Reverse Proxy ───────────────────────────────────────────────────
  traefik:
    image: traefik:v3.7
    container_name: traefik
    command:
      - "--api.insecure=true"                          # Enable dashboard (dev only)
      - "--providers.docker=true"                      # Auto-discover Docker services
      - "--providers.docker.exposedbydefault=false"    # Only expose labeled services
      - "--entrypoints.web.address=:80"                # HTTP entrypoint
      - "--log.level=DEBUG"
    ports:
      - "80:80"       # HTTP
      - "8080:8080"   # Traefik dashboard → http://localhost:8080
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Read Docker socket

  identity-service:
    image: identity-service
    build:
      context: ../..
      dockerfile: internal/services/identity/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../../internal/services/identity/.env:/config/.env:ro
      - ../../migrations/identity:/migrations:ro
        # Mount only identity service
      - ../../internal/services/identity:/workspace/internal/services/identity
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/identity/tmp
    labels:
      - "traefik.enable=true"

      # ── ForwardAuth middleware ─────────────────────────────────────────────
      # Any router that adds "jwt-auth" to its middlewares will call /verify first.
      # 200 → forward request with injected headers
      # 401 → Traefik returns 401 immediately, upstream never called
      - "traefik.http.middlewares.jwt-auth.forwardauth.address=http://identity-service:8081/verify"
      - "traefik.http.middlewares.jwt-auth.forwardauth.authRequestHeaders=Authorization"
      - "traefik.http.middlewares.jwt-auth.forwardauth.authResponseHeaders=X-Auth-Request-User-Id,X-Auth-Request-Email,X-Auth-Request-Roles"
      # ── /verify — public, NO auth middleware ─────────────────────────────────
      # Must be a separate router with higher priority so it is never caught
      # by the protected router below — an auth loop would occur otherwise.
      - "traefik.http.routers.user-verify.rule=Path(`/verify`)"
      - "traefik.http.routers.user-verify.entrypoints=web"
      - "traefik.http.routers.user-verify.priority=20"
      - "traefik.http.routers.user-verify.service=identity-service"

      # Route: /api/identity/** → identity-service
      - "traefik.http.routers.identity-service.rule=PathPrefix(`/api/identity`)"
      - "traefik.http.routers.identity-service.entrypoints=web"
      - "traefik.http.routers.identity-service.priority=10"
      - "traefik.http.middlewares.strip-identity-api.stripprefix.prefixes=/api/identity"
      - "traefik.http.routers.identity-service.middlewares=strip-identity-api,jwt-auth"

      - "traefik.http.services.identity-service.loadbalancer.server.port=8081"

    ports:
      - "8081"
    
  catalog-service:
    image: catalog-service
    build:
      context: ../..
      dockerfile: internal/services/catalog/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../internal/services/catalog/.env:/config/.env:ro
      - ../../migrations/catalog:/migrations:ro
        # Mount only catalog service
      - ../../internal/services/catalog:/workspace/internal/services/catalog
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/catalog/tmp
    labels:
      - "traefik.enable=true"
      # protected routes
      - "traefik.http.routers.catalog-service.rule=PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog-service.entrypoints=web"
      - "traefik.http.routers.catalog-service.priority=10"
      - "traefik.http.services.catalog-service.loadbalancer.server.port=8082"
      - "traefik.http.middlewares.strip-catalog-api.stripprefix.prefixes=/api/catalog"
      - "traefik.http.routers.catalog-service.middlewares=strip-catalog-api,jwt-auth"
      # public routes
      - "traefik.http.routers.catalog-service-public.rule=PathPrefix(`/api/catalog/public`)"
      - "traefik.http.routers.catalog-service-public.entrypoints=web"
      - "traefik.http.routers.catalog-service-public.priority=50"
      - "traefik.http.routers.catalog-service-public.middlewares=strip-catalog-api"
    ports:
      - "8082"
    
  commerce-service:
    image: commerce-service
    build:
      context: ../..
      dockerfile: internal/services/commerce/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../internal/services/commerce/.env:/config/.env:ro
      - ../../migrations/commerce:/migrations:ro
        # Mount only commerce service
      - ../../internal/services/commerce:/workspace/internal/services/commerce
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/commerce/tmp
    labels:
      - "traefik.enable=true"
      # protected routes
      - "traefik.http.routers.commerce-service.rule=PathPrefix(`/api/commerce`)"
      - "traefik.http.routers.commerce-service.entrypoints=web"
      - "traefik.http.routers.commerce-service.priority=10"
      - "traefik.http.services.commerce-service.loadbalancer.server.port=8083"
      - "traefik.http.middlewares.strip-commerce-api.stripprefix.prefixes=/api/commerce"
      - "traefik.http.routers.commerce-service.middlewares=strip-commerce-api,jwt-auth"
      # public routes
      - "traefik.http.routers.commerce-service-public.rule=PathPrefix(`/api/commerce/webhooks`)"
      - "traefik.http.routers.commerce-service-public.entrypoints=web"
      - "traefik.http.routers.commerce-service-public.priority=50"
      - "traefik.http.routers.commerce-service-public.middlewares=strip-commerce-api"
    ports:
      - "8083"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  es_data:
  keycloak_data:
