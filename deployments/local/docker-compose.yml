name: 2hand-shop

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - ../../rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../../rabbitmq_definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      CLI_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: true
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-elastic}
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:${ELASTIC_PASSWORD:-elastic}", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Traefik Reverse Proxy ───────────────────────────────────────────────────
  traefik:
    image: traefik:v3.7
    container_name: traefik
    command:
      - "--api.insecure=true"                          # Enable dashboard (dev only)
      - "--providers.docker=true"                      # Auto-discover Docker services
      - "--providers.docker.exposedbydefault=false"    # Only expose labeled services
      - "--entrypoints.web.address=:80"                # HTTP entrypoint
      - "--log.level=DEBUG"
    ports:
      - "80:80"       # HTTP
      - "8080:8080"   # Traefik dashboard → http://localhost:8080
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Read Docker socket
  # tyk-gateway:
  #   image: tykio/tyk-gateway:latest
  #   restart: unless-stopped
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     identity-service:
  #       condition: service_started
  #   environment:
  #     TYK_GW_SECRET: ${TYK_SECRET:-tyk-secret}
  #   volumes:
  #     - ../../gateway/tyk.conf:/opt/tyk-gateway/tyk.conf:ro
  #     - ../../gateway/apps:/opt/tyk-gateway/apps:ro
  #   ports:
  #     - "8080:8080"

  identity-service:
    image: identity-service
    build:
      context: ../..
      dockerfile: internal/services/identity/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../../internal/services/identity/.env:/config/.env:ro
      - ../../migrations/identity:/migrations:ro
        # Mount only identity service
      - ../../internal/services/identity:/workspace/internal/services/identity
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/identity/tmp
    labels:
      - "traefik.enable=true"
      # Route: /api/identity/** → identity-service
      - "traefik.http.routers.identity-service.rule=PathPrefix(`/api/identity`)"
      - "traefik.http.routers.identity-service.entrypoints=web"
      - "traefik.http.services.identity-service.loadbalancer.server.port=8081"
      # Strip /api/identity prefix before forwarding
      - "traefik.http.middlewares.strip-identity-api.stripprefix.prefixes=/api/identity"
      - "traefik.http.routers.identity-service.middlewares=strip-identity-api"
    ports:
      - "8081:8081"
    
  catalog-service:
    image: catalog-service
    build:
      context: ../..
      dockerfile: internal/services/catalog/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../internal/services/catalog/.env:/config/.env:ro
      - ../../migrations/catalog:/migrations:ro
        # Mount only catalog service
      - ../../internal/services/catalog:/workspace/internal/services/catalog
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/catalog/tmp
    labels:
      - "traefik.enable=true"
      # Route: /api/catalog/** → catalog-service
      - "traefik.http.routers.catalog-service.rule=PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog-service.entrypoints=web"
      - "traefik.http.services.catalog-service.loadbalancer.server.port=8082"
      # Strip /api prefix before forwarding
      - "traefik.http.middlewares.strip-catalog-api.stripprefix.prefixes=/api/catalog"
      - "traefik.http.routers.catalog-service.middlewares=strip-catalog-api"
    ports:
      - "8082:8082"
    
  commerce-service:
    image: commerce-service
    build:
      context: ../..
      dockerfile: internal/services/commerce/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../internal/services/commerce/.env:/config/.env:ro
      - ../../migrations/commerce:/migrations:ro
        # Mount only commerce service
      - ../../internal/services/commerce:/workspace/internal/services/commerce
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/commerce/tmp
    labels:
      - "traefik.enable=true"
      # Route: /api/commerce/** → commerce-service
      - "traefik.http.routers.commerce-service.rule=PathPrefix(`/api/commerce`)"
      - "traefik.http.routers.commerce-service.entrypoints=web"
      - "traefik.http.services.commerce-service.loadbalancer.server.port=8083"
      # Strip /api/commerce prefix before forwarding
      - "traefik.http.middlewares.strip-commerce-api.stripprefix.prefixes=/api/commerce"
      - "traefik.http.routers.commerce-service.middlewares=strip-commerce-api"
    ports:
      - "8083:8083"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  es_data:
