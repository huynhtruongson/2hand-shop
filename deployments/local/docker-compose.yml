name: 2hand-shop

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - ../../rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../../rabbitmq_definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      CLI_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: true
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-elastic}
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:${ELASTIC_PASSWORD:-elastic}", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5
  # es-setup:
  #   image: curlimages/curl:latest
  #   restart: "no"
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy
  #   command: >
  #     curl -X POST -u elastic:${ELASTIC_PASSWORD:-elastic}
  #     -H "Content-Type: application/json"
  #     http://elasticsearch:9200/_security/user/kibana_system/_password
  #     -d "{\"password\": \"${KIBANA_PASSWORD:-kibana}\"}"
  # kibana:
  #   image: docker.elastic.co/kibana/kibana:9.3.2
  #   container_name: kibana
  #   ports:
  #     - "5601:5601"
  #   environment:
  #     ELASTICSEARCH_HOSTS: http://elasticsearch:9200
  #     ELASTICSEARCH_USERNAME: kibana_system
  #     ELASTICSEARCH_PASSWORD: kibana
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy

  # ===========================================================================
  # Tyk Gateway (file-based, no Dashboard)
  # API definitions are loaded from ./gateway/apps/ at startup.
  # To reload after changing app configs:
  #   docker compose restart tyk-gateway
  # ===========================================================================

  tyk-gateway:
    image: tykio/tyk-gateway:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      identity-service:
        condition: service_started
    environment:
      TYK_GW_SECRET: ${TYK_SECRET:-tyk-secret}
    volumes:
      - ../../gateway/tyk.conf:/opt/tyk-gateway/tyk.conf:ro
      - ../../gateway/apps:/opt/tyk-gateway/apps:ro
    ports:
      - "8080:8080"

  identity-service:
    image: identity-service
    build:
      context: ../..
      dockerfile: internal/services/identity/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../../internal/services/identity/.env:/config/.env:ro
      - ../../migrations/identity:/migrations:ro
        # Mount only identity service
      - ../../internal/services/identity:/workspace/internal/services/identity
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/identity/tmp
    ports:
      - "8081:8081"
    
  catalog-service:
    image: catalog-service
    build:
      context: ../..
      dockerfile: internal/services/catalog/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../internal/services/catalog/.env:/config/.env:ro
      - ../../migrations/catalog:/migrations:ro
        # Mount only catalog service
      - ../../internal/services/catalog:/workspace/internal/services/catalog
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/catalog/tmp
    ports:
      - "8082:8082"
    
  commerce-service:
    image: commerce-service
    build:
      context: ../..
      dockerfile: internal/services/commerce/Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../internal/services/commerce/.env:/config/.env:ro
      - ../../migrations/commerce:/migrations:ro
        # Mount only commerce service
      - ../../internal/services/commerce:/workspace/internal/services/commerce
      # Mount shared pkg
      - ../../internal/pkg:/workspace/internal/pkg
      # Isolate the tmp dir so host and container don't share build artifacts
      - /workspace/internal/services/commerce/tmp
    ports:
      - "8083:8083"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  es_data:
